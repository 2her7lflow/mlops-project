name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check backend

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          CREATE_TABLES: "true"
          DISABLE_RAG: "true"
        run: |
          pytest -q backend/tests

  rag-eval:
    runs-on: ubuntu-latest
    if: ${{ secrets.GOOGLE_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt

      - name: Build vectorstore
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python backend/scripts/build_vectorstore.py

      - name: Evaluate RAG
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python backend/scripts/eval_rag.py

      - name: Enforce eval thresholds
        run: |
          python backend/scripts/check_eval_thresholds.py
