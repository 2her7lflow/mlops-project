version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./knowledge_base:/knowledge_base
    environment:
      - KNOWLEDGE_BASE_DIR=/knowledge_base
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=http://backend:8000
      - HTTP_TIMEOUT_S=180
    ports:
      - "7860:7860"
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: scheduled rebuild/eval loop (MLOps)
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - KNOWLEDGE_BASE_DIR=/knowledge_base
      - REBUILD_EVERY_DAYS=3
      - ENABLE_DVC_PUSH=false
    volumes:
      - ./backend:/app
      - ./knowledge_base:/knowledge_base
    depends_on:
      - backend
    command: python -m app.scheduler
    restart: unless-stopped
