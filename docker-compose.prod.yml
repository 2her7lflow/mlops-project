version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge_base:/knowledge_base
    environment:
      - KNOWLEDGE_BASE_DIR=/knowledge_base
    command: gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:8000 --workers 2 --timeout 120
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=http://backend:8000
      - HTTP_TIMEOUT_S=180
    ports:
      - "7860:7860"
    depends_on:
      - backend
    restart: unless-stopped
